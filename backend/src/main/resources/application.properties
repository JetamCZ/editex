spring.application.name=latex-editor

# Server Configuration
server.address=0.0.0.0
server.port=8080

spring.datasource.url=jdbc:sqlite:latex-editor.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.out-of-order=true

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# MinIO Configuration
minio.url=http://localhost:9000
minio.access.key=admin
minio.secret.key=StrongPassword123
minio.bucket.name=latex-project-files
minio.auto.create.bucket=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.allowed-types=application/pdf,image/png,image/jpeg,text/plain,application/zip,application/x-tex,text/x-tex

# LaTeX Compilation Configuration
latex.temp.directory=/tmp/latex-compilations
latex.compiler.timeout=30
latex.compiler.path=pdflatex

# AI Debug Configuration
ai.debug.provider=${AI_DEBUG_PROVIDER:anthropic}
ai.debug.anthropic.api-key=${ANTHROPIC_API_KEY:}
ai.debug.anthropic.model=${ANTHROPIC_MODEL:claude-opus-4-5}
ai.debug.openai.api-key=${OPENAI_API_KEY:}
ai.debug.openai.model=${OPENAI_MODEL:gpt-4o}
ai.debug.max-tokens=${AI_DEBUG_MAX_TOKENS:1500}

# Email Configuration (SMTP)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtps.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# App URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:noreply@editex.eu}