spring.application.name=latex-editor

# Server Configuration
server.address=0.0.0.0
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Hetzner Object Storage (S3-compatible)
minio.url=${S3_ENDPOINT}
minio.access.key=${S3_ACCESS_KEY}
minio.secret.key=${S3_SECRET_KEY}
minio.bucket.name=${S3_BUCKET_NAME}
minio.region=${S3_REGION}
minio.auto.create.bucket=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.allowed-types=application/pdf,image/png,image/jpeg,text/plain,application/zip,application/x-tex,text/x-tex

# LaTeX Compilation Configuration
latex.temp.directory=/tmp/latex-compilations
latex.compiler.timeout=30
latex.compiler.path=pdflatex
